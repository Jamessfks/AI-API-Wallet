<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI API Wallet</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        width: 300px;
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0f0f23;
        color: #e2e8f0;
        padding: 20px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }

      .logo {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 14px;
      }

      .title {
        font-size: 16px;
        font-weight: 600;
      }

      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        margin-bottom: 12px;
        font-size: 13px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      .status-dot.connected {
        background: #10b981;
      }

      .status-dot.disconnected {
        background: #ef4444;
      }

      .info {
        font-size: 12px;
        color: #94a3b8;
        text-align: center;
        line-height: 1.5;
      }

      .key-count {
        font-size: 24px;
        font-weight: 700;
        color: #3b82f6;
        text-align: center;
        margin: 12px 0;
      }

      .key-label {
        text-align: center;
        font-size: 12px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">W</div>
      <div class="title">AI API Wallet</div>
    </div>

    <div class="status" id="status">
      <div class="status-dot disconnected" id="status-dot"></div>
      <span id="status-text">Checking...</span>
    </div>

    <div class="key-count" id="key-count">-</div>
    <div class="key-label">Keys stored</div>

    <div class="info" style="margin-top: 16px" id="info">
      Checking connection to desktop app...
    </div>

    <script src="popup.js"></script>
  </body>
</html>
